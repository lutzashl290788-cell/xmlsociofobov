/* === RESET === */
*{margin:0;padding:0;box-sizing:border-box}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* === DESIGN TOKENS (visual-design-foundations craft) === */
:root{
/* Neutrals — 90% of pixels */
--bg:#080808;
--surface:#0f0d0d;
--surface-2:#131111;
--fg:#f5f5f5;
--muted:#6b6565;
--border:rgba(255,255,255,.06);

/* Accent — ONE accent, max 2 visible uses per screen */
--accent:#dc2626;
--accent-d:#991b1b;
--accent-glow:rgba(220,38,38,.15);

/* Type scale — 1.25 ratio */
--fs-display:clamp(2.5rem,8vw,4.5rem);
--fs-h1:clamp(1.75rem,5vw,2.75rem);
--fs-h2:clamp(1.25rem,3vw,1.75rem);
--fs-body:0.9375rem;
--fs-small:0.8125rem;
--fs-caption:0.6875rem;

/* Spacing — 4px base */
--sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;--sp-7:48px;--sp-8:64px;

/* Motion */
--ease:cubic-bezier(.22,1,.36,1);
--dur-fast:.15s;--dur:.25s;--dur-slow:.4s;

/* Radius */
--r-sm:6px;--r-md:10px;--r-lg:14px;
}

html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
background:var(--bg);color:var(--fg);
font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
font-size:var(--fs-body);line-height:1.6;
overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;
letter-spacing:0;
-webkit-font-smoothing:antialiased;
}
@media(hover:hover) and (pointer:fine){body{cursor:none}}
a{color:inherit;text-decoration:none}

/* === BACKGROUND — layered, no external deps === */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-1{position:absolute;inset:0;background:
radial-gradient(ellipse 70% 50% at 50% -5%,var(--accent-glow),transparent 60%),
radial-gradient(ellipse 50% 40% at 90% 95%,rgba(153,27,27,.04),transparent 60%),
linear-gradient(180deg,#080808,#0a0909 50%,#080808)}
.bg-noise{position:absolute;inset:0;opacity:.025;

canvas#ptc{position:fixed;inset:0;z-index:0;opacity:.25;pointer-events:none;will-change:transform}

/* === CURSOR === */
.cd,.cr{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);display:none}

.fi{opacity:0;transform:translateY(12px);transition:opacity var(--dur-slow) var(--ease),transform var(--dur-slow) var(--ease)}

}
</style>
